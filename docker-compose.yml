x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt

services:
  backend:
    image: ${DOCKER_USER}/docker-project-backend:latest
    restart: unless-stopped
    networks:
      - momo-net
    expose: ["8081"]
    environment:
      - LOG_LEVEL=info
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
    secrets:
      - jwt_secret
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 3
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64M
    logging: *default-logging

  frontend:
    image: ${DOCKER_USER}/docker-project-frontend:latest
    restart: unless-stopped
    networks:
      - momo-net
    depends_on:
      backend:
        condition: service_healthy
    ports: 
      - "80:80"
    environment:
      - VUE_APP_API_URL=/api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,size=128M
      - /var/run:rw,noexec,nosuid,size=64M
    logging: *default-logging

networks:
  momo-net:
    driver: bridge
    name: momo-net

volumes:
  backend-data: